mory \\\n     \"<subject>\" \"<fact>\" --repo \"<owner/repo>\"\n   ```\n   Briefly confirm what was stored: \"\ud83d\udcdd Stored: ...\"\n\n2. **Preference observation** (silent) \u2014 If the user stated or demonstrated\n   any conventions/preferences during the task, store them:\n   ```bash\n   python ~/.copilot/skills/self-learning/resources/memory_cli.py store-pref \\\n     \"<category>\" \"<fact>\" --confidence 0.8\n   ```\n\n3. **Session data** \u2014 \u2705 *Handled automatically by Copilot CLI.* Session\n   transcripts are stored in `~/.copilot/session-store.db` by the runtime.\n   The `search-sessions` and `recent-sessions` commands read this store directly.\n\n4. **Skill creation check** (ask user) \u2014 If and only if the session involved\n   a novel, reusable multi-step workflow (3+ distinct phases), ask:\n   > \"This looks like a reusable workflow. Want me to save it as a skill?\"\n\n   Use `ask_user` with choices: `[\"Save as skill\", \"Skip\"]`.\n   If the user approves, proceed to Capability 1.\n\n5. **Skill improvement check** (ask user) \u2014 If a skill was used during the\n   session and you encountered friction (skipped steps, added steps, wrong\n   order), ask:\n   > \"I noticed some improvements to the <skill> skill. Apply them?\"\n\n   Use `ask_user` with choices: `[\"Apply improvements\", \"Skip\"]`.\n   If approved, proceed to Capability 2.\n\n**Key rule**: Steps 1-2 require LLM judgment and always run silently. Step 3\nis automatic (Copilot CLI handles it). Steps 4-5 are conditional and use\n`ask_user` only when there's something worth proposing. The entire post-task\nflow is a single autonomous pass \u2014 never require the user to prompt each step\nseparately.\n\n### Do NOT self-trigger when:\n- The task was simple Q&A or a single tool call\n- The user explicitly asked you to stop learning\n- You've already run the post-task flow this session\n\n---\n\n## Explicit Invocation Flow\n\nWhen the user explicitly triggers this skill (\"learn\ able in future sessions.\n\n### Trigger\n\n- End of any substantial task (3+ tool calls)\n- User says \"remember this\" or \"save this for later\"\n- You discover a convention, pattern, or gotcha that isn't obvious\n\n### Procedure\n\n1. **Scan the session for memorable facts** \u2014 Look for:\n   - **Conventions**: Coding patterns, naming rules, file organization\n   - **Commands**: Build/test/lint commands that were verified to work\n   - **Gotchas**: Things that failed unexpectedly and required workarounds\n   - **Preferences**: User choices that indicate a preference\n   - **Architecture**: Structural decisions about the codebase\n\n2. **Filter against criteria** \u2014 Each candidate fact must be:\n   - Actionable in future tasks\n   - Independent of the current changeset\n   - Unlikely to change over time\n   - Not inferrable from a small code sample\n   - Free of secrets or sensitive data\n\n3. **Check for duplicates** \u2014 Before storing, grep existing memories by\n   searching `session_store_sql` for similar facts:\n   ```sql\n   SELECT assistant_response FROM turns\n   WHERE assistant_response ILIKE '%<key_phrase>%'\n   ORDER BY timestamp DESC LIMIT 5\n   ```\n\n4. **Store** \u2014 All facts go to local SQLite via the memory CLI:\n\n   ```bash\n   python ~/.copilot/skills/self-learning/resources/memory_cli.py store-memory \\\n     \"<subject>\" \"<fact>\" --repo \"<owner/repo>\" --citations \"...\"\n   ```\n\n5. **Confirm to the user** \u2014 Briefly mention what was stored:\n   > \"\ud83d\udcdd Stored 2 facts: verified build command, and the\n   > local vs deployed config file distinction.\"\n\n### Nudge timing\n\nWhen self-triggering (not user-invoked), be conservative:\n- Only nudge after tasks that produced verified, working results\n- Maximum 3 facts per session to avoid noise\n- Prefer facts with broad applicability over narrow ones\n\n---\n\n## Capability 4 \u2014 Cross-Session Recall\n\n**Goal**: Search past sessions to find relevant context, prior approaches,\nor historical decisions that inform the current task.\n\n### Trigger\n\n- User says \"what do you remember about X\", \"have I done this before\",\n  \"search past sessions\", or \"recall\"\n- You're about to start a task and want to check for prior art\n\n### Architecture\n\n1. **FTS5 search** finds matching turns ranked by BM25 relevance\n2. **Context windows** load surrounding turns for each match\n3. **Subagent summarization** sends matched context to an `explore` subagent\n   for focused summarization (keeps main context clean)\n\n### Procedure\n\n1. **Session data** \u2014 Copilot CLI automatically stores all session transcripts\n   in `~/.copilot/session-store.db`. No manual ingestion needed.\n\n2. **Search** \u2014 FTS5 full-text search with BM25 ranking:\n   ```bash\n   python ~/.copilot/skills/self-learning/resources/memory_cli.py search-sessions \\\n     \"sqlite FTS5 memory\" --context 3 --limit 30\n   ```\n\n   FTS5 query syntax:\n   - Keywords: `auth token refresh` (AND by default)\n   - OR: `sqlite OR memory OR preferences`\n   - Phrases: `\"database migration\"`\n   - Prefix: `deploy*`\n   - NOT: `build NOT test`\n\n3. **Summarize via subagent** \u2014 Send the search results to an `explore`\n   subagent for focused summarization. This keeps the main context clean:\n\n   ```\n   task(\n     agent_type: \"explore\",\n     prompt: \"Summarize these past session matches for the query '<query>'.\n              Focus on: what was asked, what was done, key decisions, and\n              outcomes. Be concise but preserve specific commands, paths,\n              and error messages.\n\n              SEARCH RESULTS:\n              <paste search-sessions JSON output>\"\n   )\n   ```\n\n4. **Present to user** \u2014 Synthesize the subagent's summary:\n   > \"I found 2 relevant past sessions:\n   > 1. **Last week** \u2014 You fixed the CI pipeline. The build artifact is\n   >    auto-generated by the build script. A missing config entry was\n   > arly relevant\n   - if nothing useful is found, say nothing about recall\n\n   Example:\n   > I found a related past session where you implemented Express auth middleware and debugged token handling.\n\n---\n\n## Post-Task (autonomous, single pass)\n\nRun this once after a **substantial** task only:\n- 3+ tool calls, or\n- multi-phase work, or\n- meaningful implementation plus validation\n\nDo **not** run it for:\n- simple Q&A\n- one-command operational requests\n- trivial edits\n- sessions where the user asked you not to learn\n- sessions where it already ran once\n\nSteps:\n1. **Memory nudge** \u2014 silently store 1-3 genuinely useful facts\n2. **Preference observation** \u2014 silently store clear durable preferences\n3. **Skill creation check** \u2014 ask only if the session produced a reusable multi-step workflow\n4. **Skill improvement check** \u2014 ask only if a skill was used and clear friction occurred\n\nKeep this a single autonomous pass.\n\n---\n\n## Explicit Invocation Flow\n\nIf the user explicitly asks to review, learn, or reflect, run in this order:\n\n1. Cross-session recall\n2. Memory nudge\n3. Preference observation\n4. Skill creation check\n5. Skill improvement check\n\nEnd with a short summary:\n\n> Session review complete:\n> - Stored 2 facts\n> - Found 1 related past session\n> - No skill creation candidate\n> - No skill improvements needed\n\n---\n\n## Capability 1 \u2014 Skill Auto-Creation\n\n**Goal:** turn a reusable multi-step session into a new `SKILL.md`.\n\n### Trigger\n\nUse when:\n- the user explicitly asks to create or save a skill, or\n- the session had 5+ tool calls across 3+ distinct phases and looks reusable\n\nSkip if the workflow is clearly one-off.\n\n### Procedure\n\n1. **Analyze the session**  \n   Extract:\n   - user intent\n   - ordered workflow\n   - decision points\n   - final outcome\n\n2. **Identify the reusable pattern**  \n   Ask:\n   - what varies between runs?\n   - what stays constant?\n   - is this repeatable    ```\n\n### Heuristics\n\n- if a skill has worked repeatedly without friction, leave it alone\n- user corrections are strong evidence\n- do not remove safety or validation steps without explicit approval\n\n---\n\n## Capability 3 \u2014 Memory Nudges\n\n**Goal:** persist useful durable facts for future sessions.\n\n### Trigger\n\n- end of a substantial task\n- user says \"remember this\" or \"save this\"\n- you discover a durable convention, gotcha, or verified command\n\n### Procedure\n\n1. **Find candidate facts**\n\n   Good candidates:\n   - verified commands\n   - conventions\n   - stable architecture facts\n   - important gotchas\n   - repo-specific distinctions\n   - user-stated choices that will matter later\n\n2. **Filter**\n\n   Store only facts that are:\n   - actionable later\n   - independent of the current diff\n   - reasonably stable\n   - not obvious from a quick code read\n   - not secret or sensitive\n\n3. **Avoid duplicates**\n   If the fact appears already known, skip it.\n\n4. **Store**\n   ```bash\n   python memory_cli.py store-memory \"<subject>\" \"<fact>\" --repo \"<owner/repo>\"\n   ```\n\n5. **Acknowledge briefly**\n   Example:\n   > Stored 2 facts: verified build command and config-file distinction.\n\n### Conservative Defaults\n\n- maximum 3 facts per session\n- prefer broadly reusable facts\n- only store after verified results when self-triggered\n\n---\n\n## Capability 4 \u2014 Cross-Session Recall\n\n**Goal:** find relevant past work and summarize it briefly.\n\n### Trigger\n\n- user asks what you remember\n- user asks whether they have done this before\n- session-start prior-art check applies\n- explicit \"search past sessions\" request\n\n### Procedure\n\n1. **Search using 1-3 query variants**\n   Use:\n   - broad topic\n   - specific framework or feature\n   - synonym or abbreviation if helpful\n\n2. **Run search**\n   ```bash\n   python memory_cli.py search-sessions \"<query>\" --context 3 --limit 30\n   ```\n\n3. **Handle noisy results**\n   - prefer specific matches over broad ones\n   - summarize only the top 1-2 clearly relevant matches\n   - ignore weak hits\n\n4. **Summarize**\n   If helpful, use an `explore` subagent for concise summarization focused on:\n   - what was asked\n   - what was done\n   - key decisions\n   - outcomes\n   - specific commands, paths, or errors\n\n5. **Present briefly**\n   Example:\n   > I found 2 relevant past sessions: one on CI auth config and one on Express token middleware.\n\n6. **Recent work**\n   ```bash\n   python memory_cli.py recent-sessions --limit 10\n   ```\n\n### Notes\n\n- session transcripts already exist in `~/.copilot/session-store.db`\n- no manual ingestion needed\n\n---\n\n## Capability 5 \u2014 User Preference Model\n\n**Goal:** maintain a local model of the user's durable preferences.\n\n### Scope\n\nAll memory is local in `~/.copilot/self-learning/memory.db`.  \nUse `memory_cli.py` only.\n\n### What to Track\n\nExamples:\n- code style conventions\n- workflow preferences\n- package manager preferences\n- test framework preferences\n- review and PR expectations\n- repeated user corrections\n\n### Procedure\n\n1. **Observe clear signals**\n   Store preferences when the user:\n   - explicitly states them\n   - corrects your default behavior\n   - repeatedly chooses the same approach\n\n2. **Store**\n   ```bash\n   python memory_cli.py store-pref \"<category>\" \"<fact>\" --confidence 0.8\n   ```\n\n   Use `0.9` for explicit statements such as:\n   - \"always use pnpm\"\n   - \"show a plan first\"\n   - \"use Vitest in this repo\"\n\n3. **Supersede when needed**\n   If a newer preference contradicts an older one:\n   ```bash\n   python memory_cli.py supersede-pref <old_id> \"<new_fact>\"\n   ```\n\n4. **Session-start loading**\n   Already handled by hook; do not duplicate.\n\n### Guardrails\n\n- never store secrets, tokens, or credentials\n- explicit user instructions override stored preferences\n- store durable preferences, not one-off choices\n\n---\n\n## Revision History\n\n- 2026-04-11: Initial prototype\n- 2026-04-14: Added hooks and lifecycle guidance\n- 2026-04-15: Tightened scope, added explicit-override rule, added fast paths for direct memory/preference requests, clarified session-start multi-query recall, standardized command examples\n- 2026-04-15: Added canonical local CLI invocation, clarified one-command bypass behavior, made session-start recall more deterministic, and tightened optional mention rules"}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.60)", fillcolor=lightgray, tooltip=" "];
    1 [label="1\\n(0.69)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.72)", fillcolor=cyan, tooltip=" "];
    3 [label="3\\n(0.63)", fillcolor=lightgray, tooltip=" "];
    4 [label="4\\n(0.56)", fillcolor=lightgray, tooltip=" "];
    5 [label="5\\n(0.70)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
    2 -> 3;
    3 -> 4;
    1 -> 5;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
